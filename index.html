<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Weather App</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .weather-container {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 30px 40px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            max-width: 350px;
            width: 100%;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="text"] {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #4facfe;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #00f2fe;
        }

        #weather {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="weather-container">
        <h1>Smart Weather App</h1>
        <input type="text" id="city" placeholder="Enter city name">
        <button onclick="getWeather()">Get Weather</button>
        <div id="weather"></div>
    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById('city').value.trim();
            const weatherDiv = document.getElementById('weather');

            if (!city) {
                alert("Please enter a city name!");
                return;
            }

            weatherDiv.innerHTML = "Loading...";

            try {
                const response = await fetch(`https://wttr.in/${city}?format=j1`);
                const data = await response.json();

                const today = data.current_condition[0];

                // Choose an icon based on weather
                let icon = '';
                const desc = today.weatherDesc[0].value.toLowerCase();
                if(desc.includes('sun') || desc.includes('clear')) icon = '☀️';
                else if(desc.includes('cloud')) icon = '☁️';
                else if(desc.includes('rain')) icon = '🌧️';
                else if(desc.includes('snow')) icon = '❄️';
                else icon = '🌤️';

                weatherDiv.innerHTML = `
                    <div class="weather-icon">${icon}</div>
                    <strong>${city}</strong><br>
                    ${today.weatherDesc[0].value}<br>
                    Temp: ${today.temp_C}°C | Feels like: ${today.FeelsLikeC}°C<br>
                    Humidity: ${today.humidity}%
                `;
            } catch (error) {
                console.error(error);
                weatherDiv.innerHTML = "Error fetching weather data!";
            }
        }
    </script>

</body>
</html>
